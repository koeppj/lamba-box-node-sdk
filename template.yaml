AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Node 22 ESM Lambdas for Box folder items and enterprise users using box-node-sdk v10 JWT

Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: 256
    Timeout: 30
    Architectures:
      - x86_64

Parameters:
  BoxJwtSecretArn:
    Type: String
    Default: ''
    Description: ARN or name of the Secrets Manager secret containing the Box JWT config JSON.

Conditions:
  HasBoxJwtSecretArn: !Not [!Equals [!Ref BoxJwtSecretArn, '']]

Resources:
  GetBoxFilesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-box-files
      CodeUri: .
      Handler: src/get-box-files.handler
      Policies:
        - !If
          - HasBoxJwtSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref BoxJwtSecretArn
          - !Ref AWS::NoValue
      Events:
        GetBoxFilesApi:
          Type: Api
          Properties:
            Path: /box/folders/{folderId}/items
            Method: get
      Environment:
        Variables:
          BOX_JWT_SECRET_ARN: !If [HasBoxJwtSecretArn, !Ref BoxJwtSecretArn, !Ref AWS::NoValue]
          BOX_CONFIG_FILE: ''
          BOX_FOLDER_ID: '0'
          BOX_JWT_CONFIG_JSON: ''
          BOX_JWT_CONFIG_JSON_BASE64: ''
          BOX_CLIENT_ID: ''
          BOX_CLIENT_SECRET: ''
          BOX_JWT_KEY_ID: ''
          BOX_PRIVATE_KEY: ''
          BOX_PRIVATE_KEY_PASSPHRASE: ''
          BOX_ENTERPRISE_ID: ''
          BOX_USER_ID: ''
          BOX_AS_USER_ID: ''
          BOX_TEST_FILE_ID: ''

  BoxListUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: box-list-users
      CodeUri: .
      Handler: src/box-list-users.handler
      Policies:
        - !If
          - HasBoxJwtSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref BoxJwtSecretArn
          - !Ref AWS::NoValue
      Events:
        BoxListUsersApi:
          Type: Api
          Properties:
            Path: /box/users
            Method: get
      Environment:
        Variables:
          BOX_JWT_SECRET_ARN: !If [HasBoxJwtSecretArn, !Ref BoxJwtSecretArn, !Ref AWS::NoValue]
          BOX_CONFIG_FILE: ''
          BOX_JWT_CONFIG_JSON: ''
          BOX_JWT_CONFIG_JSON_BASE64: ''
          BOX_CLIENT_ID: ''
          BOX_CLIENT_SECRET: ''
          BOX_JWT_KEY_ID: ''
          BOX_PRIVATE_KEY: ''
          BOX_PRIVATE_KEY_PASSPHRASE: ''
          BOX_ENTERPRISE_ID: ''
          BOX_USER_ID: ''
          BOX_AS_USER_ID: ''
          BOX_TEST_FILE_ID: ''

  GetSubmissionDateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-submission-date
      CodeUri: .
      Handler: src/get-submission-date.handler
      Policies:
        - !If
          - HasBoxJwtSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref BoxJwtSecretArn
          - !Ref AWS::NoValue
      Events:
        GetSubmissionDateApi:
          Type: Api
          Properties:
            Path: /box/files/{fileId}/metadata/submission-date
            Method: get
      Environment:
        Variables:
          BOX_JWT_SECRET_ARN: !If [HasBoxJwtSecretArn, !Ref BoxJwtSecretArn, !Ref AWS::NoValue]
          BOX_CONFIG_FILE: ''
          BOX_JWT_CONFIG_JSON: ''
          BOX_JWT_CONFIG_JSON_BASE64: ''
          BOX_CLIENT_ID: ''
          BOX_CLIENT_SECRET: ''
          BOX_JWT_KEY_ID: ''
          BOX_PRIVATE_KEY: ''
          BOX_PRIVATE_KEY_PASSPHRASE: ''
          BOX_ENTERPRISE_ID: ''
          BOX_USER_ID: ''
          BOX_AS_USER_ID: ''
          BOX_TEST_FILE_ID: ''

  SetSubmissionDateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: set-submission-date
      CodeUri: .
      Handler: src/set-submission-date.handler
      Policies:
        - !If
          - HasBoxJwtSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref BoxJwtSecretArn
          - !Ref AWS::NoValue
      Events:
        SetSubmissionDateApi:
          Type: Api
          Properties:
            Path: /box/files/{fileId}/metadata/submission-date/set
            Method: get
      Environment:
        Variables:
          BOX_JWT_SECRET_ARN: !If [HasBoxJwtSecretArn, !Ref BoxJwtSecretArn, !Ref AWS::NoValue]
          BOX_CONFIG_FILE: ''
          BOX_JWT_CONFIG_JSON: ''
          BOX_JWT_CONFIG_JSON_BASE64: ''
          BOX_CLIENT_ID: ''
          BOX_CLIENT_SECRET: ''
          BOX_JWT_KEY_ID: ''
          BOX_PRIVATE_KEY: ''
          BOX_PRIVATE_KEY_PASSPHRASE: ''
          BOX_ENTERPRISE_ID: ''
          BOX_USER_ID: ''
          BOX_AS_USER_ID: ''
          BOX_TEST_FILE_ID: ''

  DeletePropertiesTemplateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: delete-properties-template
      CodeUri: .
      Handler: src/delete-properties-template.handler
      Policies:
        - !If
          - HasBoxJwtSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref BoxJwtSecretArn
          - !Ref AWS::NoValue
      Events:
        DeletePropertiesTemplateApi:
          Type: Api
          Properties:
            Path: /box/files/{fileId}/metadata/properties/delete
            Method: get
      Environment:
        Variables:
          BOX_JWT_SECRET_ARN: !If [HasBoxJwtSecretArn, !Ref BoxJwtSecretArn, !Ref AWS::NoValue]
          BOX_CONFIG_FILE: ''
          BOX_JWT_CONFIG_JSON: ''
          BOX_JWT_CONFIG_JSON_BASE64: ''
          BOX_CLIENT_ID: ''
          BOX_CLIENT_SECRET: ''
          BOX_JWT_KEY_ID: ''
          BOX_PRIVATE_KEY: ''
          BOX_PRIVATE_KEY_PASSPHRASE: ''
          BOX_ENTERPRISE_ID: ''
          BOX_USER_ID: ''
          BOX_AS_USER_ID: ''
          BOX_TEST_FILE_ID: ''

  DeleteSubmissionDateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: delete-submission-date
      CodeUri: .
      Handler: src/delete-submission-date.handler
      Policies:
        - !If
          - HasBoxJwtSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref BoxJwtSecretArn
          - !Ref AWS::NoValue
      Events:
        DeleteSubmissionDateApi:
          Type: Api
          Properties:
            Path: /box/files/{fileId}/metadata/submission-date/delete
            Method: get
      Environment:
        Variables:
          BOX_JWT_SECRET_ARN: !If [HasBoxJwtSecretArn, !Ref BoxJwtSecretArn, !Ref AWS::NoValue]
          BOX_CONFIG_FILE: ''
          BOX_JWT_CONFIG_JSON: ''
          BOX_JWT_CONFIG_JSON_BASE64: ''
          BOX_CLIENT_ID: ''
          BOX_CLIENT_SECRET: ''
          BOX_JWT_KEY_ID: ''
          BOX_PRIVATE_KEY: ''
          BOX_PRIVATE_KEY_PASSPHRASE: ''
          BOX_ENTERPRISE_ID: ''
          BOX_USER_ID: ''
          BOX_AS_USER_ID: ''
          BOX_TEST_FILE_ID: ''

Outputs:
  GetBoxFilesApiUrl:
    Description: Folder items API endpoint
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/box/folders/{folderId}/items'
  BoxListUsersApiUrl:
    Description: Enterprise users API endpoint
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/box/users'
  GetSubmissionDateApiUrl:
    Description: Submission date metadata read endpoint
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/box/files/{fileId}/metadata/submission-date'
  SetSubmissionDateApiUrl:
    Description: Submission date metadata set endpoint
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/box/files/{fileId}/metadata/submission-date/set'
  DeletePropertiesTemplateApiUrl:
    Description: Properties metadata delete endpoint
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/box/files/{fileId}/metadata/properties/delete'
  DeleteSubmissionDateApiUrl:
    Description: Submission date metadata delete endpoint
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/box/files/{fileId}/metadata/submission-date/delete'
